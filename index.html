<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#080d1b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Inventario GUG</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="assets/icon-192.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div class="brand">
        <img src="assets/gug-logo.svg" alt="GUG" class="logo" />
        <div>
          <h1>Inventario GUG</h1>
          <p>Magazzino eventi · carico/scarico · CSV</p>
        </div>
      </div>
      <button class="ghost" id="installBtn" hidden>Installa</button>
    </header>

    <main class="content">
      <section class="stats">
        <article><strong id="statProducts">0</strong><span>prodotti</span></article>
        <article><strong id="statPieces">0</strong><span>pezzi totali</span></article>
        <article><strong id="statLow">0</strong><span>sotto scorta</span></article>
        <article><strong id="statValue">€0</strong><span>valore stimato</span></article>
      </section>

      <section class="toolbar">
        <input id="search" type="search" placeholder="Cerca prodotto, categoria, posizione..." />
        <select id="categoryFilter"><option value="">Tutte le categorie</option></select>
        <select id="sortBy">
          <option value="name">Ordina per nome</option>
          <option value="qty-asc">Quantità crescente</option>
          <option value="qty-desc">Quantità decrescente</option>
          <option value="low">Prima sotto scorta</option>
        </select>
      </section>

      <section id="list" class="product-list"></section>
      <div id="empty" class="empty">Nessun prodotto. Premi “+ Prodotto”.</div>
    </main>

    <footer class="bottom-bar">
      <button id="exportBtn">Esporta CSV</button>
      <label class="file-btn">Importa CSV<input id="importInput" type="file" accept=".csv,text/csv" hidden /></label>
      <button id="backupBtn">Backup</button>
      <button class="danger" id="resetBtn">Reset</button>
    </footer>

    <button class="fab" id="addBtn">+ Prodotto</button>
  </div>

  <dialog id="productDialog">
    <form method="dialog" id="productForm" class="modal">
      <h2 id="dialogTitle">Nuovo prodotto</h2>
      <input type="hidden" id="productId" />
      <label>Nome prodotto<input id="name" required placeholder="Es. Birra, piatti, tovaglioli" /></label>
      <div class="grid2">
        <label>Categoria<input id="category" placeholder="Food, Bevande, Pulizie..." /></label>
        <label>Posizione<input id="location" placeholder="Cantina, frigo, box..." /></label>
      </div>
      <div class="grid3">
        <label>Quantità<input id="qty" type="number" inputmode="numeric" min="0" value="0" /></label>
        <label>Scorta min.<input id="minQty" type="number" inputmode="numeric" min="0" value="0" /></label>
        <label>Costo €<input id="cost" type="number" inputmode="decimal" min="0" step="0.01" value="0" /></label>
      </div>
      <label>Codice / barcode<input id="code" placeholder="facoltativo" /></label>
      <label>Note<textarea id="notes" rows="3" placeholder="Note, fornitore, dettagli..."></textarea></label>
      <div class="modal-actions">
        <button type="button" class="secondary" id="cancelBtn">Annulla</button>
        <button type="submit">Salva</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>
</html>
