<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827"><link rel="manifest" href="manifest.json"><link rel="icon" href="icon.svg">
<title>Inventario</title>
<style>
:root{--bg:#0b1020;--card:#111827;--mut:#9ca3af;--txt:#f9fafb;--acc:#22c55e;--bad:#ef4444;--line:#1f2937}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:linear-gradient(180deg,#0b1020,#111827);color:var(--txt);padding-bottom:88px}header{position:sticky;top:0;z-index:3;background:rgba(11,16,32,.92);backdrop-filter:blur(10px);padding:18px 16px;border-bottom:1px solid var(--line)}h1{margin:0;font-size:24px}.sub{color:var(--mut);font-size:13px;margin-top:4px}.wrap{padding:14px;max-width:900px;margin:auto}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.stat,.card{background:rgba(17,24,39,.9);border:1px solid var(--line);border-radius:18px;padding:14px;box-shadow:0 10px 30px #0003}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--mut)}.controls{display:grid;gap:10px;margin:14px 0}input,select,textarea,button{font:inherit;border-radius:14px;border:1px solid #374151;background:#0f172a;color:var(--txt);padding:12px}textarea{min-height:70px}button{background:#1f2937;font-weight:700}button.primary{background:var(--acc);border-color:var(--acc);color:#052e16}.grid{display:grid;gap:10px}.item{display:grid;gap:8px}.row{display:flex;gap:8px;align-items:center;justify-content:space-between}.pill{font-size:12px;color:#d1d5db;border:1px solid #374151;border-radius:999px;padding:4px 8px}.qty{font-size:28px;font-weight:800}.danger{color:#fecaca;background:#7f1d1d;border-color:#991b1b}.small{font-size:13px;color:var(--mut)}.actions{display:flex;gap:8px;flex-wrap:wrap}.actions button{padding:8px 10px;font-size:13px}.fab{position:fixed;right:18px;bottom:18px;border-radius:999px;padding:15px 20px;background:var(--acc);color:#052e16;border:none;box-shadow:0 10px 30px #0008}.modal{position:fixed;inset:0;background:#0009;display:none;align-items:flex-end;z-index:10}.modal.on{display:flex}.sheet{background:#0b1020;border:1px solid var(--line);border-radius:24px 24px 0 0;padding:16px;width:100%;max-width:900px;margin:auto}.form{display:grid;gap:10px}.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}.empty{text-align:center;color:var(--mut);padding:40px 10px}.bar{position:fixed;left:0;right:0;bottom:0;background:#050816;border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:8px;z-index:4}.bar button{flex:1;font-size:13px;padding:10px}a{color:#86efac}@media(min-width:700px){.controls{grid-template-columns:2fr 1fr 1fr}.modal{align-items:center}.sheet{border-radius:24px;max-width:560px}.fab{bottom:82px}}
</style></head><body>
<header><h1>Inventario</h1><div class="sub">Salvataggio automatico sul dispositivo · esportazione CSV</div></header>
<main class="wrap"><section class="stats"><div class="stat"><b id="totItems">0</b><span>prodotti</span></div><div class="stat"><b id="totQty">0</b><span>pezzi totali</span></div><div class="stat"><b id="lowQty">0</b><span>sotto scorta</span></div></section>
<section class="controls"><input id="search" placeholder="Cerca prodotto, categoria, posizione…"><select id="catFilter"><option value="">Tutte le categorie</option></select><select id="sort"><option value="name">Ordina per nome</option><option value="qtyAsc">Quantità crescente</option><option value="qtyDesc">Quantità decrescente</option><option value="updated">Ultima modifica</option></select></section>
<section id="list" class="grid"></section></main>
<div class="bar"><button onclick="exportCSV()">Esporta CSV</button><button onclick="document.getElementById('importFile').click()">Importa CSV</button><button onclick="resetAll()">Reset</button><input id="importFile" type="file" accept=".csv" hidden onchange="importCSV(event)"></div>
<button class="fab" onclick="openModal()">+ Prodotto</button>
<div id="modal" class="modal" onclick="if(event.target.id==='modal')closeModal()"><div class="sheet"><div class="row"><h2 id="modalTitle" style="margin:0">Nuovo prodotto</h2><button onclick="closeModal()">Chiudi</button></div><div class="form" style="margin-top:12px"><input id="name" placeholder="Nome prodotto *"><div class="two"><input id="qty" type="number" inputmode="numeric" placeholder="Quantità" value="1"><input id="min" type="number" inputmode="numeric" placeholder="Scorta min." value="0"></div><div class="two"><input id="cat" placeholder="Categoria"><input id="pos" placeholder="Posizione"></div><textarea id="notes" placeholder="Note"></textarea><button class="primary" onclick="saveItem()">Salva</button></div></div></div>
<script>
const KEY='inventario_pwa_v1';let items=JSON.parse(localStorage.getItem(KEY)||'[]');let editId=null;
function persist(){localStorage.setItem(KEY,JSON.stringify(items));render()}
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function render(){const q=search.value.toLowerCase(), cf=catFilter.value, sortBy=sort.value;let arr=items.filter(x=>[x.name,x.cat,x.pos,x.notes].join(' ').toLowerCase().includes(q)&&(!cf||x.cat===cf));arr.sort((a,b)=>sortBy==='qtyAsc'?a.qty-b.qty:sortBy==='qtyDesc'?b.qty-a.qty:sortBy==='updated'?b.updated-a.updated:a.name.localeCompare(b.name));totItems.textContent=items.length;totQty.textContent=items.reduce((s,x)=>s+(+x.qty||0),0);lowQty.textContent=items.filter(x=>(+x.min||0)>0 && (+x.qty||0)<=+x.min).length;const cats=[...new Set(items.map(x=>x.cat).filter(Boolean))].sort();catFilter.innerHTML='<option value="">Tutte le categorie</option>'+cats.map(c=>`<option ${c===cf?'selected':''}>${esc(c)}</option>`).join('');list.innerHTML=arr.length?arr.map(x=>`<article class="card item"><div class="row"><div><b>${esc(x.name)}</b><div class="small">${esc(x.cat||'Senza categoria')} · ${esc(x.pos||'Nessuna posizione')}</div></div><div class="qty ${(+x.min||0)>0&&(+x.qty||0)<=+x.min?'danger pill':''}">${x.qty}</div></div>${x.notes?`<div class="small">${esc(x.notes)}</div>`:''}<div class="actions"><button onclick="changeQty('${x.id}',-1)">-1</button><button onclick="changeQty('${x.id}',1)">+1</button><button onclick="editItem('${x.id}')">Modifica</button><button onclick="delItem('${x.id}')">Elimina</button></div></article>`).join(''):'<div class="empty">Nessun prodotto. Premi “+ Prodotto”.</div>'}
function openModal(){editId=null;modalTitle.textContent='Nuovo prodotto';name.value='';qty.value=1;min.value=0;cat.value='';pos.value='';notes.value='';modal.classList.add('on');setTimeout(()=>name.focus(),100)}function closeModal(){modal.classList.remove('on')}
function saveItem(){if(!name.value.trim())return alert('Inserisci il nome');const obj={id:editId||crypto.randomUUID(),name:name.value.trim(),qty:+qty.value||0,min:+min.value||0,cat:cat.value.trim(),pos:pos.value.trim(),notes:notes.value.trim(),updated:Date.now()};items=editId?items.map(x=>x.id===editId?obj:x):[obj,...items];closeModal();persist()}
function editItem(id){let x=items.find(i=>i.id===id);if(!x)return;editId=id;modalTitle.textContent='Modifica prodotto';name.value=x.name;qty.value=x.qty;min.value=x.min||0;cat.value=x.cat||'';pos.value=x.pos||'';notes.value=x.notes||'';modal.classList.add('on')}
function changeQty(id,d){items=items.map(x=>x.id===id?{...x,qty:Math.max(0,(+x.qty||0)+d),updated:Date.now()}:x);persist()}function delItem(id){if(confirm('Eliminare prodotto?')){items=items.filter(x=>x.id!==id);persist()}}
function exportCSV(){let rows=[['nome','quantita','scorta_min','categoria','posizione','note'],...items.map(x=>[x.name,x.qty,x.min,x.cat,x.pos,x.notes])];let csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='inventario.csv';a.click()}
function importCSV(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let lines=r.result.split(/\r?\n/).filter(Boolean).slice(1);items=lines.map(l=>{let m=[...l.matchAll(/"((?:""|[^"])*)"(?:,|$)/g)].map(x=>x[1].replaceAll('""','"'));return{id:crypto.randomUUID(),name:m[0]||'Prodotto',qty:+m[1]||0,min:+m[2]||0,cat:m[3]||'',pos:m[4]||'',notes:m[5]||'',updated:Date.now()}});persist()};r.readAsText(f)}
function resetAll(){if(confirm('Cancellare tutto l’inventario da questo dispositivo?')){items=[];persist()}}search.oninput=render;sort.onchange=render;catFilter.onchange=render;if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js');render();
</script></body></html>
