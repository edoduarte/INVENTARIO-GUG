<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Inventario GUG</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="assets/icon-192.png">
<meta name="theme-color" content="#070b18">
<style>
:root{--bg:#070b18;--panel:#0e1526;--panel2:#111a2d;--text:#f4f7ff;--muted:#9aa3b5;--line:#253049;--green:#22c55e;--red:#ef4444;--orange:#f59e0b}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;padding-bottom:calc(120px + env(safe-area-inset-bottom))}
header{position:sticky;top:0;z-index:2;background:linear-gradient(180deg,#080d1d,#080d1de8);backdrop-filter:blur(12px);padding:18px 18px 14px;border-bottom:1px solid var(--line)} .brand{display:flex;align-items:center;gap:12px}.logo{width:54px;height:54px;border-radius:16px;box-shadow:0 8px 30px rgba(249,115,22,.18)}
h1{margin:0;font-size:31px}.sub{color:var(--muted);font-size:15px;margin-top:6px}.wrap{padding:16px;max-width:850px;margin:0 auto}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}.stat{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px}.stat b{font-size:28px;display:block}.stat span{color:var(--muted);font-size:13px}
input,select,textarea{width:100%;background:#0b1222;color:var(--text);border:1px solid #33405a;border-radius:15px;padding:14px 14px;font-size:17px;margin-bottom:10px;outline:none}textarea{min-height:80px}.filters{display:grid;gap:0}.empty{text-align:center;color:var(--muted);padding:70px 10px;font-size:18px}.list{display:grid;gap:12px;margin-top:14px}.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:14px}.cardTop{display:flex;gap:12px;align-items:flex-start}.thumb{width:58px;height:58px;border-radius:14px;object-fit:cover;background:#172033;border:1px solid var(--line);flex:0 0 auto}.name{font-size:19px;font-weight:800}.meta{color:var(--muted);font-size:14px;margin-top:4px}.qty{margin-left:auto;text-align:right;font-size:24px;font-weight:900}.low{color:var(--orange)}.actions{display:flex;gap:8px;margin-top:12px}.actions button,.bottom button,.modal button{border:0;border-radius:14px;padding:13px 14px;font-size:16px;font-weight:800;color:white;background:#1f2937}.actions button{flex:1}.danger{background:var(--red)!important}.ok{background:var(--green)!important}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:10;background:linear-gradient(180deg,rgba(7,11,24,0),#070b18 18%);padding:30px 16px calc(14px + env(safe-area-inset-bottom));display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;max-width:850px;margin:0 auto}.addBtn{position:fixed;right:18px;bottom:calc(92px + env(safe-area-inset-bottom));z-index:11;background:var(--green);color:white;border:0;border-radius:999px;padding:18px 22px;font-size:18px;font-weight:900;box-shadow:0 12px 35px rgba(34,197,94,.35)}
.modalBg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:20;align-items:flex-end}.modal{background:#0b1222;border:1px solid var(--line);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow:auto;padding:18px 16px calc(18px + env(safe-area-inset-bottom))}.modal h2{margin:0 0 14px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fileLabel{display:block;background:#172033;border:1px dashed #3a4866;border-radius:15px;padding:14px;text-align:center;margin-bottom:10px;color:var(--muted)}.preview{width:86px;height:86px;border-radius:18px;object-fit:cover;display:none;margin:0 auto 10px}.modalBtns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}.hiddenFile{display:none}
@media(min-width:700px){.modalBg{align-items:center}.modal{border-radius:24px;max-width:560px;margin:auto}.bottom{left:50%;transform:translateX(-50%);width:850px}.addBtn{right:calc(50% - 405px)}}
</style>
</head><body>
<header><div class="brand"><img src="assets/logo.svg" class="logo" alt="GUG"><div><h1>Inventario GUG</h1><div class="sub">Salvataggio automatico sul dispositivo · esportazione CSV</div></div></div></header>
<div class="wrap">
 <div class="stats"><div class="stat"><b id="nProd">0</b><span>prodotti</span></div><div class="stat"><b id="nPezzi">0</b><span>pezzi totali</span></div><div class="stat"><b id="nLow">0</b><span>sotto scorta</span></div></div>
 <div class="filters"><input id="search" placeholder="Cerca prodotto, categoria, posizione..."><select id="catFilter"><option value="">Tutte le categorie</option></select><select id="sort"><option value="name">Ordina per nome</option><option value="qty">Ordina per quantità</option><option value="cat">Ordina per categoria</option></select></div>
 <div id="list" class="list"></div><div id="empty" class="empty">Nessun prodotto. Premi “+ Prodotto”.</div>
</div>
<button class="addBtn" onclick="openModal()">+ Prodotto</button>
<div class="bottom"><button onclick="exportCSV()">Esporta CSV</button><button onclick="document.getElementById('importFile').click()">Importa CSV</button><button onclick="resetAll()">Reset</button></div>
<input id="importFile" class="hiddenFile" type="file" accept=".csv" onchange="importCSV(event)">
<div id="modalBg" class="modalBg"><div class="modal"><h2 id="modalTitle">Nuovo prodotto</h2><input id="id" type="hidden"><input id="name" placeholder="Nome prodotto"><div class="row"><input id="qty" type="number" inputmode="numeric" placeholder="Quantità"><input id="min" type="number" inputmode="numeric" placeholder="Scorta minima"></div><input id="category" placeholder="Categoria es. Bevande, Food"><input id="position" placeholder="Posizione es. Frigo, Magazzino"><input id="price" type="number" step="0.01" inputmode="decimal" placeholder="Prezzo unitario opzionale"><textarea id="notes" placeholder="Note"></textarea><img id="preview" class="preview"><label class="fileLabel">Aggiungi foto<input id="photo" type="file" accept="image/*" capture="environment" class="hiddenFile" onchange="loadPhoto(event)"></label><div class="modalBtns"><button onclick="closeModal()">Annulla</button><button class="ok" onclick="saveProduct()">Salva</button></div></div></div>
<script>
const KEY='inventarioGUG_v2';let products=JSON.parse(localStorage.getItem(KEY)||'[]');let photoData='';
const $=id=>document.getElementById(id);function persist(){localStorage.setItem(KEY,JSON.stringify(products));render()}
function cats(){return [...new Set(products.map(p=>p.category).filter(Boolean))].sort()}
function render(){let q=$('search').value.toLowerCase(),cf=$('catFilter').value,s=$('sort').value;let old=cf;$('catFilter').innerHTML='<option value="">Tutte le categorie</option>'+cats().map(c=>`<option ${c==old?'selected':''}>${esc(c)}</option>`).join('');let arr=products.filter(p=>(!cf||p.category==cf)&&[p.name,p.category,p.position,p.notes].join(' ').toLowerCase().includes(q));arr.sort((a,b)=>s=='qty'?a.qty-b.qty:s=='cat'?(a.category||'').localeCompare(b.category||''):(a.name||'').localeCompare(b.name||''));$('nProd').textContent=products.length;$('nPezzi').textContent=products.reduce((t,p)=>t+(+p.qty||0),0);$('nLow').textContent=products.filter(p=>(+p.min||0)>0&&(+p.qty||0)<=+p.min).length;$('empty').style.display=arr.length?'none':'block';$('list').innerHTML=arr.map(p=>`<div class="card"><div class="cardTop">${p.photo?`<img class="thumb" src="${p.photo}">`:`<div class="thumb"></div>`}<div><div class="name">${esc(p.name)}</div><div class="meta">${esc(p.category||'Senza categoria')} · ${esc(p.position||'Nessuna posizione')}</div>${p.notes?`<div class="meta">${esc(p.notes)}</div>`:''}</div><div class="qty ${(+p.min||0)>0&&(+p.qty||0)<=+p.min?'low':''}">${p.qty}</div></div><div class="actions"><button onclick="move('${p.id}',-1)">-1</button><button onclick="move('${p.id}',1)">+1</button><button onclick="edit('${p.id}')">Modifica</button><button class="danger" onclick="del('${p.id}')">Elimina</button></div></div>`).join('')}
function esc(x){return String(x||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
['search','catFilter','sort'].forEach(id=>$(id).addEventListener('input',render));
function openModal(){photoData='';$('modalTitle').textContent='Nuovo prodotto';['id','name','qty','min','category','position','price','notes'].forEach(i=>$(i).value='');$('preview').style.display='none';$('modalBg').style.display='flex'}function closeModal(){$('modalBg').style.display='none'}
function saveProduct(){let name=$('name').value.trim();if(!name)return alert('Inserisci il nome prodotto');let id=$('id').value||Date.now().toString(36);let p={id,name,qty:+$('qty').value||0,min:+$('min').value||0,category:$('category').value.trim(),position:$('position').value.trim(),price:+$('price').value||0,notes:$('notes').value.trim(),photo:photoData};let i=products.findIndex(x=>x.id==id);if(i>=0){if(!photoData)p.photo=products[i].photo;products[i]=p}else products.push(p);closeModal();persist()}
function edit(id){let p=products.find(x=>x.id==id);if(!p)return;openModal();$('modalTitle').textContent='Modifica prodotto';['id','name','qty','min','category','position','price','notes'].forEach(k=>$(k).value=p[k]??'');photoData=p.photo||'';$('preview').src=photoData;$('preview').style.display=photoData?'block':'none'}
function del(id){if(confirm('Eliminare questo prodotto?')){products=products.filter(p=>p.id!=id);persist()}}function move(id,n){let p=products.find(x=>x.id==id);if(p){p.qty=Math.max(0,(+p.qty||0)+n);persist()}}
function loadPhoto(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{photoData=r.result;$('preview').src=photoData;$('preview').style.display='block'};r.readAsDataURL(f)}
function exportCSV(){let rows=[['nome','quantita','scorta_minima','categoria','posizione','prezzo','note'],...products.map(p=>[p.name,p.qty,p.min,p.category,p.position,p.price,p.notes])];let csv=rows.map(r=>r.map(v=>'"'+String(v??'').replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='inventario-gug.csv';a.click()}
function importCSV(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{let lines=r.result.split(/\r?\n/).filter(Boolean).slice(1);products=lines.map(line=>{let a=[...line.matchAll(/"((?:""|[^"])*)"(?:,|$)/g)].map(m=>m[1].replaceAll('""','"'));return{id:Date.now().toString(36)+Math.random(),name:a[0]||'',qty:+a[1]||0,min:+a[2]||0,category:a[3]||'',position:a[4]||'',price:+a[5]||0,notes:a[6]||'',photo:''}}).filter(p=>p.name);persist()};r.readAsText(f)}
function resetAll(){if(confirm('Cancellare tutto l’inventario?')){products=[];persist()}}render();
</script></body></html>
